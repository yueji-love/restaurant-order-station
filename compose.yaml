name: restaurant-order-station

services:
  app:
    image: restaurant-order-station:latest
    build:
      context: .
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 5175
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    ports:
      - "127.0.0.1:${APP_PORT:-5175}:5175"
    volumes:
      - ./data:/app/server/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5175/api/auth/me').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    stop_grace_period: 20s
